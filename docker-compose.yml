services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./Docker/apache.conf:/etc/apache2/sites-enabled/000-default.conf
      - ./Docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
      - redis
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: dev77z
      MYSQL_PASSWORD: dev77z9x
    volumes: 
      - db_data:/var/lib/mysql

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  phpmysqladmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      # PMA_USER: dev77z
      # PMA_PASSWORD: dev77z9x

volumes:
  db_data:
  redis_data: